<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Quarter Tone">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#2a1457"/>
      <stop offset="60%" stop-color="#1a0f2e"/>
      <stop offset="100%" stop-color="#0d0815"/>
    </radialGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0612"/>
      <stop offset="100%" stop-color="#160a26"/>
    </linearGradient>
    <filter id="glowPink" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowAmber" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Cabinet background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Marquee bar -->
  <rect x="56" y="76" width="400" height="48" rx="8" fill="#1e1235" stroke="#ff2d95" stroke-width="3" filter="url(#glowPink)"/>
  <text x="256" y="111" text-anchor="middle" font-family="'Righteous','Arial Black',sans-serif" font-size="28" fill="#ffffff" letter-spacing="4">QUARTER TONE</text>

  <!-- Screen -->
  <rect x="72" y="148" width="368" height="232" rx="14" fill="url(#screen)" stroke="#b829dd" stroke-width="3"/>

  <!-- Quarter note -->
  <g filter="url(#glowAmber)" transform="translate(190 178)">
    <rect x="74" y="0" width="10" height="140" fill="#ffaa22"/>
    <ellipse cx="48" cy="142" rx="40" ry="28" fill="#ffaa22" transform="rotate(-18 48 142)"/>
    <path d="M84 0 C 130 18, 138 60, 96 78" stroke="#ffaa22" stroke-width="10" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Scanlines -->
  <g opacity="0.18">
    <rect x="72" y="148" width="368" height="2" fill="#000"/>
    <rect x="72" y="180" width="368" height="2" fill="#000"/>
    <rect x="72" y="212" width="368" height="2" fill="#000"/>
    <rect x="72" y="244" width="368" height="2" fill="#000"/>
    <rect x="72" y="276" width="368" height="2" fill="#000"/>
    <rect x="72" y="308" width="368" height="2" fill="#000"/>
    <rect x="72" y="340" width="368" height="2" fill="#000"/>
    <rect x="72" y="372" width="368" height="2" fill="#000"/>
  </g>

  <!-- Control deck -->
  <rect x="56" y="404" width="400" height="44" rx="8" fill="#1e1235" stroke="#b829dd" stroke-width="3"/>
  <circle cx="118" cy="426" r="12" fill="#ff2d95"/>
  <circle cx="160" cy="426" r="12" fill="#ffaa22"/>
  <circle cx="202" cy="426" r="12" fill="#22eeff"/>
  <rect x="248" y="416" width="146" height="20" rx="4" fill="#0a0612" stroke="#22eeff" stroke-width="2"/>
</svg>
