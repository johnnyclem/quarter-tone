<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0,viewport-fit=cover">
  <title>Quarter Tone</title>
  <meta name="description" content="Classic arcade-inspired sequencers with an embedded synthesizer and drum machine.">
  <!-- PWA -->
  <link rel="manifest" href="./manifest.webmanifest">
  <meta name="theme-color" content="#ff2d95">
  <meta name="color-scheme" content="dark">
  <link rel="icon" type="image/svg+xml" href="./icons/icon.svg">
  <link rel="apple-touch-icon" href="./icons/icon.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Quarter Tone">
  <meta name="mobile-web-app-capable" content="yes">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <!-- Plausible analytics: update data-domain to the deployed host -->
  <script defer data-domain="quarter-tone.app" src="https://plausible.io/js/script.js"></script>
  <script>window.plausible=window.plausible||function(){(window.plausible.q=window.plausible.q||[]).push(arguments)};</script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Righteous&display=swap');
    :root {
      --neon-pink: #ff2d95; --neon-purple: #b829dd; --neon-amber: #ffaa22;
      --neon-cyan: #22eeff; --deep-purple: #1a0f2e; --arcade-dark: #0d0815;
      --glow-pink: rgba(255,45,149,0.4); --glow-amber: rgba(255,170,34,0.4);
      --glow-purple: rgba(184,41,221,0.3); --cabinet-bg: #1e1235;
      --screen-bg: #0a0612; --text-warm: #f0d8ff; --text-dim: #8866aa;
      --bezel: #18102a;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#000;font-family:'Press Start 2P',monospace;color:var(--text-warm);overflow:hidden;height:100vh;width:100vw;height:100dvh}

/* TITLE */
#title-screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;background:radial-gradient(ellipse at 50% 40%,rgba(184,41,221,0.2) 0%,transparent 60%),radial-gradient(ellipse at center,var(--deep-purple) 0%,var(--arcade-dark) 100%);transition:opacity 0.6s}
#title-screen.hidden{opacity:0;pointer-events:none}
.neon-title{font-family:'Righteous',cursive;font-size:clamp(40px,10vw,90px);color:#fff;text-shadow:0 0 7px #fff,0 0 10px #fff,0 0 21px #fff,0 0 42px var(--neon-pink),0 0 82px var(--neon-pink),0 0 92px var(--neon-pink),0 0 102px var(--neon-pink),0 0 151px var(--neon-pink);animation:neon-flicker 3s infinite;letter-spacing:4px;margin-bottom:8px}
.neon-subtitle{font-family:'Righteous',cursive;font-size:clamp(10px,2.5vw,20px);color:var(--neon-amber);text-shadow:0 0 10px var(--neon-amber),0 0 30px rgba(255,170,34,0.5);letter-spacing:8px;margin-bottom:50px}
@keyframes neon-flicker{0%,19%,21%,23%,25%,54%,56%,100%{text-shadow:0 0 7px #fff,0 0 10px #fff,0 0 21px #fff,0 0 42px var(--neon-pink),0 0 82px var(--neon-pink),0 0 92px var(--neon-pink),0 0 102px var(--neon-pink)}20%,24%,55%{text-shadow:none;color:rgba(255,255,255,0.6)}}
.insert-coin{font-family:'Press Start 2P',monospace;font-size:clamp(8px,1.5vw,13px);color:var(--neon-amber);animation:blink 1.2s step-end infinite;cursor:pointer;padding:16px 36px;border:2px solid var(--neon-amber);border-radius:4px;box-shadow:0 0 10px var(--glow-amber),inset 0 0 10px rgba(255,170,34,0.1);transition:all 0.2s;background:none}
.insert-coin:hover{background:rgba(255,170,34,0.15);box-shadow:0 0 20px var(--glow-amber),inset 0 0 20px rgba(255,170,34,0.2)}
@keyframes blink{50%{opacity:0}}

/* Arcade cabinet bezel chrome (marquee, side art, control deck) lives in
   styles/cabinet.css — loaded via the <link> below this <style>. */
/* CABINET */
#cabinet{display:none;width:100vw;height:100vh;flex-direction:column;position:relative}
#cabinet.active{display:flex}

/* MARQUEE */
#marquee{height:52px;flex-shrink:0;background:linear-gradient(180deg,#2c1050 0%,#1a0a35 30%,var(--bezel) 100%);border-bottom:3px solid var(--neon-pink);box-shadow:0 3px 30px var(--glow-pink),0 1px 0 rgba(255,255,255,0.05) inset;display:flex;align-items:center;padding:0 16px;position:relative;z-index:10}
#marquee::before,#marquee::after{content:'';position:absolute;top:8px;bottom:8px;width:60px;background:repeating-linear-gradient(0deg,transparent,transparent 4px,rgba(255,45,149,0.15) 4px,rgba(255,45,149,0.15) 5px)}
#marquee::before{left:12px}#marquee::after{right:12px}
.marquee-title{font-family:'Righteous',cursive;font-size:20px;color:#fff;text-shadow:0 0 8px var(--neon-pink),0 0 20px rgba(255,45,149,0.5);letter-spacing:3px;margin-left:80px}
.marquee-game{font-size:10px;color:var(--neon-amber);text-shadow:0 0 8px var(--glow-amber);margin-left:20px}
.marquee-right{margin-left:auto;display:flex;gap:10px;align-items:center;margin-right:80px}
.marquee-score{font-size:10px;color:var(--neon-cyan);text-shadow:0 0 8px rgba(34,238,255,0.5)}
.m-btn{background:none;border:1px solid var(--neon-purple);color:var(--neon-purple);font-family:'Press Start 2P',monospace;font-size:7px;padding:5px 10px;cursor:pointer;border-radius:3px;box-shadow:0 0 6px var(--glow-purple);transition:all 0.15s}
.m-btn:hover{background:rgba(184,41,221,0.2);box-shadow:0 0 14px var(--glow-purple)}

/* SCREEN */
#screen-wrap{flex:1;display:flex;position:relative;overflow:hidden;background:#000}
.side-bezel{width:28px;flex-shrink:0;background:linear-gradient(180deg,var(--bezel) 0%,#0e0820 50%,var(--bezel) 100%);position:relative;z-index:5}
.side-bezel::after{content:'';position:absolute;top:20px;bottom:20px;width:4px;background:repeating-linear-gradient(180deg,rgba(255,45,149,0.1) 0px,rgba(255,45,149,0.1) 2px,rgba(184,41,221,0.08) 2px,rgba(184,41,221,0.08) 6px,transparent 6px,transparent 12px)}
.side-bezel.left::after{right:6px}.side-bezel.right::after{left:6px}
.side-bezel.left{border-right:1px solid rgba(184,41,221,0.2);box-shadow:2px 0 15px rgba(184,41,221,0.08)}
.side-bezel.right{border-left:1px solid rgba(184,41,221,0.2);box-shadow:-2px 0 15px rgba(184,41,221,0.08)}
#game-viewport{flex:1;display:flex;align-items:center;justify-content:center;position:relative;background:var(--screen-bg);padding:6px;min-height:0;min-width:0}
/* CRT frame: aspect-ratio-locked wrapper around the canvas. JS sizes it to the
   largest 480x400 box that fits the viewport; canvas fills 100% of it. */
#crt-frame{position:relative;width:0;height:0;background:#000;box-shadow:0 0 24px rgba(184,41,221,0.18),0 0 2px rgba(255,45,149,0.3);border-radius:4px;overflow:hidden}
#game-canvas{display:block;width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges}
/* CRT scanlines — fixed-thickness repeating bands over the canvas only. */
#crt-frame::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent 0,transparent 2px,rgba(0,0,0,0.28) 2px,rgba(0,0,0,0.28) 3px);mix-blend-mode:multiply;pointer-events:none;z-index:6}
/* CRT vignette, phosphor tint, and faint bezel edge. */
#crt-frame::before{content:'';position:absolute;inset:0;box-shadow:inset 0 0 120px rgba(0,0,0,0.65),inset 0 0 40px rgba(184,41,221,0.08);border:1px solid rgba(184,41,221,0.18);border-radius:4px;pointer-events:none;z-index:7}
/* Extra CRT layer: subpixel RGB mask + very subtle flicker. */
.crt-mask{position:absolute;inset:0;pointer-events:none;z-index:8;background:repeating-linear-gradient(90deg,rgba(255,45,149,0.04) 0,rgba(255,45,149,0.04) 1px,rgba(34,238,255,0.04) 1px,rgba(34,238,255,0.04) 2px,rgba(255,170,34,0.04) 2px,rgba(255,170,34,0.04) 3px);mix-blend-mode:screen;opacity:0.55;animation:crt-flicker 5.2s steps(24,end) infinite}
@keyframes crt-flicker{0%,96%,100%{opacity:0.55}97%{opacity:0.4}98%{opacity:0.62}99%{opacity:0.48}}
/* CRT-off accessibility mode — disables all overlay layers. */
body.crt-off #crt-frame::after,body.crt-off #crt-frame::before,body.crt-off .crt-mask{display:none}
body.crt-off #crt-frame{box-shadow:none;border-radius:0}
/* Fullscreen state — shrink side bezels so the screen fills the display. */
:fullscreen .side-bezel,:-webkit-full-screen .side-bezel{width:8px}

/* CONTROL DECK */
#control-deck{height:40px;flex-shrink:0;background:linear-gradient(0deg,#2c1050 0%,var(--bezel) 100%);border-top:3px solid var(--neon-purple);box-shadow:0 -3px 20px var(--glow-purple);display:flex;align-items:center;padding:0 40px;gap:18px;font-size:7px;color:var(--text-dim);position:relative;z-index:10}
#control-deck::before{content:'';position:absolute;left:50%;transform:translateX(-50%);bottom:5px;width:80px;height:3px;background:linear-gradient(90deg,var(--neon-pink) 0%,var(--neon-pink) 15%,transparent 15%,transparent 35%,var(--neon-amber) 35%,var(--neon-amber) 50%,transparent 50%,transparent 70%,var(--neon-cyan) 70%,var(--neon-cyan) 85%,transparent 85%);border-radius:2px;opacity:0.5}
.hint-key{color:var(--neon-cyan);text-shadow:0 0 4px rgba(34,238,255,0.3)}

/* GAME MENU */
#game-menu{position:absolute;inset:0;background:rgba(10,6,18,0.96);display:flex;flex-direction:column;align-items:center;padding-top:40px;z-index:50;overflow-y:auto}
#game-menu.hidden{display:none}
.menu-title{font-family:'Righteous',cursive;font-size:24px;color:var(--neon-pink);text-shadow:0 0 15px var(--glow-pink);margin-bottom:30px;letter-spacing:4px}
.game-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;padding:0 30px 30px;width:100%;max-width:800px}
.game-card{background:linear-gradient(135deg,rgba(184,41,221,0.1),rgba(255,45,149,0.05));border:1px solid rgba(184,41,221,0.25);border-radius:8px;padding:14px 10px;cursor:pointer;transition:all 0.2s;text-align:center}
.game-card:hover{border-color:var(--neon-pink);box-shadow:0 0 20px var(--glow-pink);transform:translateY(-3px)}
.game-card .emoji{font-size:32px;display:block;margin-bottom:8px}
.game-card .name{font-size:8px;color:var(--neon-amber);text-shadow:0 0 4px var(--glow-amber);margin-bottom:4px}
.game-card .desc{font-size:6px;color:var(--text-dim);line-height:1.8}

/* SYNTH DRAWER */
#synth-toggle{position:fixed;right:0;top:50%;transform:translateY(-50%);z-index:100;background:var(--cabinet-bg);border:1px solid var(--neon-purple);border-right:none;border-radius:6px 0 0 6px;padding:12px 6px;cursor:pointer;color:var(--neon-purple);box-shadow:-2px 0 12px var(--glow-purple);transition:right 0.3s ease;display:none;writing-mode:vertical-rl;font-family:'Press Start 2P',monospace;font-size:7px;letter-spacing:3px}
#synth-toggle.active{display:block}
#synth-toggle.open{right:260px}
#synth-drawer{position:fixed;top:0;right:-260px;bottom:0;width:260px;background:linear-gradient(180deg,var(--cabinet-bg) 0%,var(--arcade-dark) 100%);border-left:2px solid var(--neon-purple);box-shadow:-4px 0 30px var(--glow-purple);z-index:99;padding:60px 14px 14px;overflow-y:auto;transition:right 0.3s ease}
#synth-drawer.open{right:0}
.panel-section{margin-bottom:16px}
.panel-label{font-size:8px;color:var(--neon-pink);text-shadow:0 0 6px var(--glow-pink);margin-bottom:10px;letter-spacing:2px;text-transform:uppercase}
.knob-row{display:flex;flex-wrap:wrap;gap:10px}
.knob-group{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:50px}
.knob-name{font-size:5px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px}
.knob-val{font-size:8px;color:var(--neon-amber);text-shadow:0 0 4px var(--glow-amber);cursor:pointer;padding:3px 8px;border:1px solid rgba(255,170,34,0.2);border-radius:3px;transition:all 0.15s;user-select:none}
.knob-val:hover{border-color:var(--neon-amber);box-shadow:0 0 8px var(--glow-amber)}
.slider-group{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.slider-header{display:flex;justify-content:space-between;align-items:center}
.slider-label{font-size:6px;color:var(--text-dim);letter-spacing:1px}
.slider-value{font-size:8px;color:var(--neon-cyan);text-shadow:0 0 4px rgba(34,238,255,0.4)}
input[type="range"]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:rgba(184,41,221,0.2);outline:none}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--neon-pink);box-shadow:0 0 8px var(--glow-pink);cursor:pointer}

.disco-dot{position:fixed;width:3px;height:3px;border-radius:50%;background:white;opacity:0;animation:disco-sparkle var(--dur) var(--delay) infinite;z-index:1;pointer-events:none}
@keyframes disco-sparkle{0%,100%{opacity:0;transform:scale(0.5)}50%{opacity:var(--peak);transform:scale(1.5)}}

/* RESPONSIVE BREAKPOINTS — panels/menu.
   Cabinet chrome (bezel, marquee, control-deck) lives in styles/cabinet.css. */

/* TABLET */
@media(max-width:1023px) and (min-width:601px){
  #synth-drawer{width:220px;right:-220px;padding:54px 12px 12px}
  #synth-toggle.open{right:220px}
  .menu-title{font-size:20px;margin-bottom:24px}
  .game-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;padding:0 20px 24px}
}

/* MOBILE — full-width drawer overlay, compact menu */
@media(max-width:600px){
  #synth-drawer{width:100vw;right:-100vw;padding:56px 20px 20px}
  #synth-drawer.open{right:0}
  #synth-toggle{top:auto;bottom:8px;transform:none;writing-mode:horizontal-tb;padding:6px 10px;border-radius:6px 0 0 6px;font-size:7px;letter-spacing:2px}
  #synth-toggle.open{right:0;top:8px;bottom:auto}
  .knob-row{gap:14px;justify-content:flex-start}
  .knob-group{min-width:60px}
  .panel-label{font-size:9px}
  .menu-title{font-size:18px;margin-bottom:20px}
  .game-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;padding:0 14px 20px}
  .game-card{padding:10px 6px}
  .game-card .emoji{font-size:26px;margin-bottom:6px}
  #game-menu{padding-top:24px}
}

/* LANDSCAPE / SHORT VIEWPORTS */
@media(max-height:480px) and (orientation:landscape){
  #synth-drawer{padding-top:44px}
}

  </style>
  <link rel="stylesheet" href="styles/cabinet.css">
</head>
<body>
<div id="disco-env"></div>
<div id="title-screen">
  <div class="neon-title">Quarter Tone</div>
  <div class="neon-subtitle">GAME ● SYNTH ● ARCADE</div>
  <button class="insert-coin" onclick="startArcade()">▶ INSERT COIN ◀</button>
</div>
<div id="cabinet">
  <div id="marquee">
    <span class="marquee-title">Quarter Tone</span>
    <span class="marquee-game" id="current-game-label">SELECT A GAME</span>
    <div class="marquee-right">
      <span class="marquee-score" id="score-display">0</span>
      <button class="m-btn" onclick="toggleMenu()">GAMES</button>
      <button class="m-btn" onclick="saveGameState()" title="Save game state">SAVE</button>
      <button class="m-btn" onclick="loadGameState()" title="Load saved state">LOAD</button>
      <button class="m-btn" onclick="randomizeAll()">🎲</button>
      <button class="m-btn" id="crt-btn" onclick="toggleCRT()" title="Toggle CRT overlay">CRT</button>
      <button class="m-btn" onclick="toggleFullscreen()" title="Toggle fullscreen">⛶</button>
      <button class="m-btn" onclick="toggleSynth()">♫</button>
    </div>
  </div>
  <div id="screen-wrap">
    <div class="side-bezel left"></div>
    <div id="game-viewport">
      <div id="crt-frame">
        <canvas id="game-canvas" width="480" height="400"></canvas>
        <div class="crt-mask"></div>
      </div>
      <div id="game-menu">
        <div class="menu-title">SELECT GAME</div>
        <div class="game-grid" id="game-grid"></div>
      </div>
    </div>
    <div class="side-bezel right"></div>
  </div>
  <div id="control-deck">
    <span><span class="hint-key">←→↑↓</span> MOVE</span>
    <span><span class="hint-key">SPACE</span> ACTION</span>
    <span><span class="hint-key">TAB</span> MENU</span>
    <span><span class="hint-key">Q</span> SCALE</span>
    <span><span class="hint-key">A/S</span> KEY ±</span>
    <span><span class="hint-key">SAVE/LOAD</span> RESTORE</span>
    <span style="margin-left:auto"><span class="hint-key">♫</span> SYNTH</span>
  </div>
</div>
<div id="synth-toggle" onclick="toggleSynth()">♫ SYNTH</div>
<div id="synth-drawer">
  <div class="panel-section"><div class="panel-label">♫ TONE</div><div class="knob-row">
    <div class="knob-group"><span class="knob-name">KEY</span><span class="knob-val" id="knob-key" onclick="cycleKey()">C</span></div>
    <div class="knob-group"><span class="knob-name">SCALE</span><span class="knob-val" id="knob-scale" onclick="cycleScale()">Major</span></div>
    <div class="knob-group"><span class="knob-name">WAVE</span><span class="knob-val" id="knob-wave" onclick="cycleWave()">Tri</span></div>
    <div class="knob-group"><span class="knob-name">ARP</span><span class="knob-val" id="knob-arp" onclick="cycleArp()">Up</span></div>
  </div></div>
  <div class="panel-section"><div class="panel-label">♪ MIX</div>
    <div class="slider-group"><div class="slider-header"><span class="slider-label">DELAY</span><span class="slider-value" id="delay-val">0.3</span></div><input type="range" min="0" max="100" value="30" oninput="setDelay(this.value)"></div>
    <div class="slider-group"><div class="slider-header"><span class="slider-label">REVERB</span><span class="slider-value" id="reverb-val">0.4</span></div><input type="range" min="0" max="100" value="40" oninput="setReverb(this.value)"></div>
    <div class="slider-group"><div class="slider-header"><span class="slider-label">VOLUME</span><span class="slider-value" id="vol-val">0.7</span></div><input type="range" min="0" max="100" value="70" oninput="setVolume(this.value)"></div>
    <div class="slider-group"><div class="slider-header"><span class="slider-label">BPM</span><span class="slider-value" id="bpm-val">120</span></div><input type="range" min="60" max="200" value="120" oninput="setBPM(this.value)"></div>
  </div>
  <div class="panel-section"><div class="panel-label">⚡ FX</div><div class="knob-row">
    <div class="knob-group"><span class="knob-name">OCTAVE</span><span class="knob-val" id="knob-octave" onclick="cycleOctave()">4</span></div>
    <div class="knob-group"><span class="knob-name">ATTACK</span><span class="knob-val" id="knob-attack" onclick="cycleAttack()">0.02</span></div>
    <div class="knob-group"><span class="knob-name">RELEASE</span><span class="knob-val" id="knob-release" onclick="cycleRelease()">0.3</span></div>
  </div></div>
</div>
<script type="module">
/* 2.6 — Zustand-backed synth state. One vanilla store owns every TONE/FX
   knob, every MIX slider, and the drawer's open flag; the classic script
   below reads and mutates it exclusively through `window.synthStore`. */
import { createStore } from 'https://esm.sh/zustand@5.0.12/vanilla';
const KEYS=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const SCALES={Major:[0,2,4,5,7,9,11],Minor:[0,2,3,5,7,8,10],Penta:[0,2,4,7,9],Blues:[0,3,5,6,7,10],Dorian:[0,2,3,5,7,9,10],Mixo:[0,2,4,5,7,9,10],Phrygian:[0,1,3,5,7,8,10]};
const WAVES=['triangle','sine','square','sawtooth'];
const ARPS=['Up','Down','Bounce','Random'];
const ATTACKS=[0.005,0.02,0.05,0.1,0.2];
const RELEASES=[0.1,0.2,0.3,0.5,0.8,1.2];
const MIN_OCTAVE=2,MAX_OCTAVE=6,MIN_BPM=60,MAX_BPM=200;
const SN=Object.keys(SCALES);
const c01=v=>!Number.isFinite(v)?0:Math.max(0,Math.min(1,v));
const cBpm=v=>{if(!Number.isFinite(v))return 120;const n=Math.round(v);return Math.max(MIN_BPM,Math.min(MAX_BPM,n));};
const DEF={key:0,scale:'Major',waveIdx:0,arpIdx:0,octave:4,attackIdx:1,releaseIdx:2,delayWet:0.3,reverbWet:0.4,volume:0.7,bpm:120,drawerOpen:false};
window.synthStore=createStore((set,get)=>({
  ...DEF,
  cycleKey:()=>set({key:(get().key+1)%12}),
  cycleScale:()=>{const i=(SN.indexOf(get().scale)+1)%SN.length;set({scale:SN[i]});},
  cycleWave:()=>set({waveIdx:(get().waveIdx+1)%WAVES.length}),
  cycleArp:()=>set({arpIdx:(get().arpIdx+1)%ARPS.length}),
  cycleOctave:()=>set({octave:get().octave>=MAX_OCTAVE?MIN_OCTAVE:get().octave+1}),
  cycleAttack:()=>set({attackIdx:(get().attackIdx+1)%ATTACKS.length}),
  cycleRelease:()=>set({releaseIdx:(get().releaseIdx+1)%RELEASES.length}),
  setDelay:v=>set({delayWet:c01(v)}),
  setReverb:v=>set({reverbWet:c01(v)}),
  setVolume:v=>set({volume:c01(v)}),

  init(){this.sel=0;this.tick=0;this.roadOffset=0;this._spaceDown=false;this._lastNav=-999;this._lastAdj=-999;setScore(0);},

    grGrad.addColorStop(0,'#22eeff');grGrad.addColorStop(0.5,'#ffaa22');grGrad.addColorStop(1,'#ff2d95');
    ctx.fillStyle=grGrad;ctx.fillRect(mx,my,meterW*grFill,meterH);
    ctx.strokeStyle='rgba(184,41,221,0.6)';ctx.strokeRect(mx-0.5,my-0.5,meterW+1,meterH+1);
    ctx.font='6px "Press Start 2P"';ctx.fillStyle='#b829dd';
    ctx.fillText('GR',mx-18,my+5);
    ctx.fillStyle=compressorState.bypass?'#8866aa':'#22eeff';
    ctx.fillText(compressorState.bypass?'BYPASS':'-'+grDb.toFixed(1)+'dB',mx+meterW+8,my+5);
    // Parameter boxes (3 x 2 grid)
    const cols=3,rows=2,bw=W/cols,bh=36,py0=DASH_Y+20;
    for(let i=0;i<this.params.length;i++){
      const col=i%cols,row=Math.floor(i/cols);
      const bx=col*bw+4,by=py0+row*(bh+4),w=bw-8;
      const sel=(i===this.sel);
      ctx.fillStyle=sel?'rgba(255,170,34,0.14)':'rgba(184,41,221,0.08)';
      ctx.fillRect(bx,by,w,bh);
      ctx.strokeStyle=sel?'#ffaa22':'#5533aa';
      ctx.lineWidth=sel?2:1;
      ctx.strokeRect(bx+0.5,by+0.5,w-1,bh-1);
      ctx.font='6px "Press Start 2P"';
      ctx.fillStyle=sel?'#ffaa22':'#b829dd';
      ctx.fillText(this.params[i].label,bx+6,by+11);
      // Value bar under label
      const p=this.params[i],cur=compressorState[p.key];
      const t=Math.max(0,Math.min(1,(cur-p.min)/(p.max-p.min)));
      ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(bx+6,by+16,w-12,3);
      ctx.fillStyle=sel?'#ffaa22':'#ff2d95';ctx.fillRect(bx+6,by+16,(w-12)*t,3);
      // Formatted value
      ctx.font='8px "Press Start 2P"';
      ctx.fillStyle=sel?'#fff':'#f0d8ff';
      ctx.fillText(p.fmt(cur),bx+6,by+31);
    }
    // Shortcut hint at bottom
    ctx.font='6px "Press Start 2P"';ctx.fillStyle='#8866aa';
    const hint='<-/-> SEL  ^/v ADJ  SPACE BYPASS';
    const tw=ctx.measureText(hint).width;
    ctx.fillText(hint,(W-tw)/2,H-4);
  },
  getState(){return _cs({sel:this.sel,compressor:compressorState});},
  loadState(s){
    if(!s)return;
    this.sel=s.sel||0;
    const c=s.compressor||{};
    for(const k of Object.keys(COMPRESSOR_DEFAULTS)){
      if(k==='bypass')continue;
      if(k in c)setCompressorParam(k,c[k]);
    }
    if('bypass' in c&&c.bypass!==compressorState.bypass)toggleCompressorBypass();
  }
}
];
function buildMenu(){const g=document.getElementById('game-grid');g.innerHTML='';for(const gm of GAMES){const c=document.createElement('div');c.className='game-card';c.innerHTML='<span class="emoji">'+gm.emoji+'</span><div class="name">'+gm.name+'</div><div class="desc">'+gm.desc+'</div>';c.onclick=()=>launchGame(gm.id);g.appendChild(c);}}
function launchGame(id){const g=GAMES.find(gm=>gm.id===id);if(!g)return;currentGame=g;g.init();document.getElementById('game-menu').classList.add('hidden');document.getElementById('current-game-label').textContent=g.name.toUpperCase();analytics.selectGame(id,'menu');}
function gameFrame(){if(currentGame){currentGame.update();currentGame.draw();}requestAnimationFrame(gameFrame);}
async function startArcade(){await initAudio();document.getElementById('title-screen').classList.add('hidden');document.getElementById('cabinet').classList.add('active');document.getElementById('synth-toggle').classList.add('active');buildMenu();resizeCanvas();gameFrame();analytics.startSession();}
window.addEventListener('keydown',e=>{if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();});

/* ---------------------------------------------------------------------------
 * PWA: register the service worker so Quarter Tone boots offline after the
 * first visit. The SW (sw.js) uses Workbox cache-first for assets and
 * stale-while-revalidate for navigations.
 *
 * - Only registered when served over http(s) (skipped for `file://` opens).
 * - Update flow: when a new SW is found and finishes installing, we surface
 *   a "NEW VERSION ▶" tap target in the marquee that activates the waiting
 *   worker and reloads the cabinet.
 * ------------------------------------------------------------------------- */
if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.protocol === 'http:')) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js', { scope: './' }).then((reg) => {
      const showUpdateAvailable = () => {
        const right = document.querySelector('.marquee-right');
        if (!right || document.getElementById('pwa-update-btn')) return;
        const btn = document.createElement('button');
        btn.id = 'pwa-update-btn';
        btn.className = 'm-btn';
        btn.title = 'A new version of Quarter Tone is available';
        btn.textContent = 'NEW ▶';
        btn.style.borderColor = 'var(--neon-amber)';
        btn.style.color = 'var(--neon-amber)';
        btn.style.boxShadow = '0 0 10px var(--glow-amber)';
        btn.onclick = () => {
          if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
        };
        right.insertBefore(btn, right.firstChild);
      };

      // A waiting worker on first load means an update was downloaded
      // during a previous session.
      if (reg.waiting && navigator.serviceWorker.controller) showUpdateAvailable();

      reg.addEventListener('updatefound', () => {
        const sw = reg.installing;
        if (!sw) return;
        sw.addEventListener('statechange', () => {
          if (sw.state === 'installed' && navigator.serviceWorker.controller) {
            // New SW installed alongside an existing controller → update ready.
            showUpdateAvailable();
          }
        });
      });
    }).catch((err) => {
      console.warn('[pwa] Service worker registration failed:', err);
    });

    // When the active SW changes (because SKIP_WAITING took effect), reload
    // once so the new precached shell is used. Guarded to run at most once.
    let reloaded = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (reloaded) return;
      reloaded = true;
      window.location.reload();
    });
  });
}
</script>
